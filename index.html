<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Bull Competition — Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="display-body" data-theme="dark">

  <div class="display-wrapper">

    <!-- ── Header ── -->
    <header class="display-header">
      <div class="title-block">
        <div class="ramadan-header-decor">🌙 &nbsp; رمضان كريم &nbsp; 🌙</div>
        <h1 class="display-title">LEADERBOARD</h1>
        <div class="header-divider"></div>
      </div>
    </header>

    <!-- ── Prizes Section (admin-managed title + floating cards) ── -->
    <div class="prizes-section" id="prizes-section" style="display:none">
      <div class="prizes-title" id="prizes-title">PLAY AND WIN MANY PRIZES</div>
      <div class="prize-cards" id="prize-cards"></div>
    </div>

    <!-- ── Leaderboard ── -->
    <main class="leaderboard-container" id="leaderboard">
      <div class="empty-state">
        <span class="empty-icon">🏁</span>
        <p>Waiting for players&hellip;</p>
      </div>
    </main>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="display.js"></script>
</body>
</html>
